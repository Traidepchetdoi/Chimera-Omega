name: 🩸 OMEGA CLOUD FORGE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  forge_apk:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Tải Mã Nguồn
        uses: actions/checkout@v4
      
      - name: ⚙️ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: 🚀 Tải Trực Tiếp Gradle 8.4 (Bypass Wrapper)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4
        
      - name: 🔨 Đánh Lửa Trực Tiếp (Build APK)
        run: gradle assembleDebug
        
      - name: 📦 Đóng Gói Vật Phẩm
        uses: actions/upload-artifact@v4
        with:
          name: Omega-Host-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
