name: OMEGA PHOENIX BUILD
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Source
        uses: actions/checkout@v4
        
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      # 🔒 KHÓA THỜI GIAN: ÉP GRADLE PHẢI LÀ VERSION 8.4
      # AGP 8.1.4 chỉ sống được trong kỷ nguyên Gradle 8.x
      - name: ⚡ Setup Gradle 8.4 (Temporal Lock)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
          
      # ⚡ BUILD TRỰC TIẾP BẰNG GRADLE 8.4 (KHÔNG CẦN GRADLEW)
      - name: 🏗️ Build Debug APK
        run: gradle assembleDebug --no-daemon --warning-mode=none
        
      # 📦 Upload Artifact
      - name: 📦 Upload APK to Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chimera-omega-apk-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5
