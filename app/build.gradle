android {
    namespace 'com.omega.host'
    compileSdk 34

    defaultConfig {
        applicationId "com.omega.host"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "Omega-Stealth-1.0"
        
        // BẮT BUỘC: Chỉ định rõ ABI cho điện thoại ARM64, tránh build ra rác x86 làm nặng APK
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }
    }

    buildTypes {
        release {
            // TỐI QUAN TRỌNG: Tắt R8 Minification cho bản build GitHub để tránh xóa mất hàm Callback
            // Nếu muốn tàng hình tuyệt đối (obfuscate), phải viết file proguard-rules.pro, 
            // nhưng với người mới build trên điện thoại, TẮT NÓ ĐI để đảm bảo 0% Crash.
            minifyEnabled false 
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}