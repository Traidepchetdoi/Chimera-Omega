plugins {
    id 'com.android.application'
}

android {
    namespace 'com.chimera.touch'
    compileSdk 34

    defaultConfig {
        applicationId "com.chimera.touch"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "OMEGA-IMMUTABLE-DNA"
        multiDexEnabled true
    }

    // 🧬 DNA BẤT BIẾN (CHỮ KÝ VĨNH CỬU)
    signingConfigs {
        omega {
            storeFile file('../.github/keystore/omega.keystore')
            storePassword 'omega123'
            keyAlias 'omega'
            keyPassword 'omega123'
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.omega
            minifyEnabled false
        }
        debug {
            signingConfig signingConfigs.omega
            minifyEnabled false
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.mlkit:face-detection:16.1.5'
    implementation 'androidx.annotation:annotation:1.7.0'
}
