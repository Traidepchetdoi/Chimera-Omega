plugins {
    id 'com.android.application'
}

android {
    namespace 'com.chimera.touch'
    compileSdk 34

    defaultConfig {
        applicationId "com.chimera.touch"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "OMEGA-ZERO-CONFIG"
        multiDexEnabled true
    }

    // ⚡ ĐÃ CẮT BỎ HOÀN TOÀN signingConfigs
    // Gradle sẽ tự động dùng debug.keystore ngầm định của máy chủ Ubuntu
    
    buildTypes {
        release {
            minifyEnabled false
            // ⚡ ĐÃ CẮT BỎ signingConfig
        }
        debug {
            minifyEnabled false
            // ⚡ ĐÃ CẮT BỎ signingConfig
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.mlkit:face-detection:16.1.5'
    
    implementation 'androidx.annotation:annotation:1.7.0'
}
